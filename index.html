<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL 2026 Live Updates</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>IPL 2026 Points Table</h1>
        <p>Last Updated: Automated via GitHub Actions</p>
        
        <div id="table-content">
            <p>The table is being generated. Please wait for the first automation run...</p>
        </div>
    </div>

    <script>
        // This script loads the points-table.html file generated by your Python script
        fetch('points-table.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('table-content').innerHTML = data;
            })
            .catch(err => console.log("Table not ready yet. Running first build..."));
    </script>
</body>
</html>
