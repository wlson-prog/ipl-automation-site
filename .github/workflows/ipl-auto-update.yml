name: IPL Auto Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at 12:00 AM
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_ipl.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "IPL Bot"
          git config --global user.email "bot@yourdomain.com"
          git add points-table.html
          git commit -m "Auto-update IPL Points Table" || exit 0
          git push
